<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Interattiva Onboarding</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #c2d8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #map-container {
            position: relative;
            width: min(1100px, 100vw - 40px);
            aspect-ratio: 16 / 9;
            background-color: #a2d9f5;
            overflow: hidden;
        }

        /* --- 1. Sfondo Mare --- */
        @keyframes sea-move {
            0% { transform: scale(1.02) translate(0, 0); }
            50% { transform: scale(1.02) translate(-0.5%, -0.3%); }
            100% { transform: scale(1.02) translate(0, 0); }
        }

        .layer-sea {
            position: absolute;
            inset: 0;
            background-image: url('mare.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            animation: sea-move 20s ease-in-out infinite alternate;
            pointer-events: none;
        }

        /* --- 2. Mappa --- */
        .layer-map {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            pointer-events: none;
        }

        /* --- 3. Barca fissa --- */
        #boat-container {
            position: absolute;
            width: 15%;
            top: 32%;
            left: 58%;
            transform: translate(-50%, -50%);
            z-index: 3;
            filter: drop-shadow(3px 3px 3px rgba(0,0,0,0.3));
            pointer-events: none;
        }

        @keyframes sailing-motion {
            0% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(1deg) translateY(1px); }
            50% { transform: rotate(0deg) translateY(2px); }
            75% { transform: rotate(-1deg) translateY(1px); }
            100% { transform: rotate(0deg) translateY(0); }
        }

        #boat-img {
            width: 100%;
            display: block;
            animation: sailing-motion 3s infinite ease-in-out;
        }

        /* --- 4. Pin sopra la barca --- */
        #pin-container {
            position: absolute;
            width: 5%;
            top: 13.5%;
            left: 60.7%;
            transform: translate(-50%, -50%);
            z-index: 4;
            pointer-events: none;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.25));
        }

        @keyframes pin-bounce {
            0% { transform: translate(-50%, -50%) translateY(0); }
            25% { transform: translate(-50%, -50%) translateY(-6px); }
            50% { transform: translate(-50%, -50%) translateY(0); }
            75% { transform: translate(-50%, -50%) translateY(-3px); }
            100% { transform: translate(-50%, -50%) translateY(0); }
        }

        #pin-img {
            width: 100%;
            display: block;
            animation: pin-bounce 1.4s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div class="layer-sea"></div>

        <!-- mappa -->
        <img src="mappa.png" class="layer-map" alt="Mappa">

        <!-- barca fissa -->
        <div id="boat-container">
            <img src="barca.png" id="boat-img" alt="Barca">
        </div>

        <!-- pin sopra la barca -->
        <div id="pin-container">
            <img src="pin.png" id="pin-img" alt="Pin">
        </div>
    </div>

</body>
</html>
